<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New York Knicks Ultimate Trivia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="game-container">
        
        <section id="start-screen" class="screen">
            <h1>Knicks Ultimate Trivia</h1>
            <p>Test your knowledge of Knicks history, legends, and stats.</p>
            <button id="start-btn" class="action-btn">Tip Off (Start Game)</button>
        </section>

        <section id="quiz-screen" class="screen hidden">
            <header class="quiz-header">
                <div class="stats">
                    <span id="score-display">Score: 0</span>
                    <span id="streak-display"></span>
                </div>
                <div id="shot-clock" class="timer">24</div>
            </header>
            
            <div id="progress-bar-container">
                <div id="progress-bar"></div>
            </div>

            <h2 id="question-text">Question goes here...</h2>
            
            <div id="options-container" class="options-grid">
                </div>
            
            <p id="fun-fact" class="hidden"></p>
            <button id="next-btn" class="action-btn hidden">Next Question</button>
        </section>

        <section id="results-screen" class="screen hidden">
            <h2>Game Over!</h2>
            <p>Your Final Score: <span id="final-score">0</span></p>
            <button id="restart-btn" class="action-btn">Play Again</button>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
